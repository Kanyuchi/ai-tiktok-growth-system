services:
  postgres:
    image: postgres:16
    container_name: tiktok_ai_analytics_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: tiktok_ai_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
